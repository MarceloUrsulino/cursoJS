<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>somando numeros</title>
</head>
<body>
    <h1>somando valores</h1>
    <input type="number" name="textn1" id="txtn1">
    <input type="number" name="txtn2" id="txtn2">
    <input type="button" value="somar" onclick="somar()">
    <div id="res">Resultado</div>
    <script>
        function somar() {
            var tn1 = window.document.querySelector('input#txtn1') //ou get.ElementById
            var tn2 = window.document.querySelector('input#txtn2')
            //Seleciona os dois inputs e salva nas variáveis tn1 e tn2.

            var res = window.document.getElementById('res')
            //Seleciona a div onde o resultado vai aparecer.

            var n1 = Number(tn1.value)
            var n2 = Number(tn2.value)
            //Pega o valor digitado nos inputs com .value. O Number() converte o valor para número, porque tudo que vem de um input é string por padrão. Sem isso 1 + 1 viraria "11" ao invés de 2!

            var s = n1 + n2
            //Soma os dois números.

            res.innerHTML = `a soma entre ${n1} e ${n2} é igual a ${s}.` 
            //Exibe o resultado na div usando template literal com crase.
        }
    </script>
</body>
</html>
